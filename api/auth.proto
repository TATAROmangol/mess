syntax = "proto3";

package auth;

option go_package = "./auth";

import "google/api/annotations.proto";

service LoginService {
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      get: "/login"
    };
  }
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      get: "/logout"
    };
  }
  rpc Refresh(RefreshRequest) returns (LoginResponse) {
    option (google.api.http) = {
      get: "/refresh"
    };
  }
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string token = 1;
}

message LogoutRequest {
  string token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message RefreshRequest {}

message RefreshResponse {
  string token = 1;
}


service UserService {
  rpc AddSubject(AddSubjectRequest) returns (AddSubjectResponse);
  rpc DeleteSubject(DeleteSubjectRequest) returns (DeleteSubjectResponse);
  rpc GetSubjectID(GetSubjectIDRequest) returns (GetSubjectIDResponse);
}

message AddSubjectRequest {
  string subject_id = 1;
  string login = 2;
  string password = 3;
}

message AddSubjectResponse {
  bool token = 1;
}

message DeleteSubjectRequest {
  string subject_id = 1;
}

message DeleteSubjectResponse {
  bool success = 1;
}

message GetSubjectIDRequest {
  string token = 1;
}

message GetSubjectIDResponse {
  string subject_id = 1;
}

